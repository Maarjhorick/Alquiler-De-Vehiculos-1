name: CI DevSecOps Alquiler Vehiculos

on:
  pull_request:
    branches: [ "develop", "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar Codigo Fuente
        uses: actions/checkout@v3

      - name: 2. Configurar Entorno Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Compilacion y Pruebas Unitarias (JaCoCo Coverage)
        run: mvn clean verify sonar:sonar -Dsonar.host.url=https://sonarcloud.io -Dsonar.organization=maarjhorick -Dsonar.projectKey=Maarjhorick_Alquiler-De-Vehiculos-1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: 4. Analisis de Seguridad de Dependencias (Snyk SAST)
        run: |
          npm install -g snyk
          snyk test --severity-threshold=high || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
         
      - name: "5. Empaquetado: Construir Imagen Docker"
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/alquiler-api:latest .

      - name: "6. Escaneo de Vulnerabilidades del Imagen (Trivy)"
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/alquiler-api:latest'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: "7. Despliegue: Subir contenedor a Docker Hub"
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker push ${{ secrets.DOCKER_USERNAME }}/alquiler-api:latest
