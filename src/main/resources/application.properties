spring.application.name=alquiler
# URL: localhost:3306/nombre_de_tu_bd
spring.datasource.url=jdbc:mysql://localhost:3306/alquiler_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
# En Workbench/MySQL puro, a veces sí defines una contraseña al instalar. 
# Si no pusiste nada, déjalo vacío.
spring.datasource.password=tu_contraseña 

# JPA / Hibernate
# 'update' crea las tablas automáticamente si no existen
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect